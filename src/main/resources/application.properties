spring.application.name=comunication
spring.datasource.url=jdbc:mysql://localhost:3306/jobboard_messages
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# --- Configurazione WebSocket & Server ---
# Imposta la porta del microservizio (diversa da Laravel, es. 8080 o 8081)
server.port=8080

# Permetti l'invio di messaggi più grandi (es. se caricherai immagini in futuro)
spring.messages.max-payload-size=64KB

# Logging per vedere chi si connette e si disconnette (molto utile in fase di test)
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.messaging=DEBUG